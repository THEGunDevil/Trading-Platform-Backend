root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  # Main command (used on Linux/macOS and as base)
  cmd = "go build -o ./tmp/main.exe ./cmd/api"
  bin = "tmp/main.exe"
  entrypoint = ["./tmp/main.exe"]

  # Extra options
  delay = 1000
  exclude_dir = ["tmp", "vendor", "testdata", "node_modules"]
  exclude_file = []
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  follow_symlink = false
  include_ext = ["go", "tpl", "tmpl", "html"]
  kill_delay = "0s"
  log = "build-errors.log"
  stop_on_error = true
  send_interrupt = false

# Windows-specific overrides
[build.windows]
  cmd = "go build -o ./tmp/main.exe ./cmd/api"
  bin = "tmp\\main.exe"
  entrypoint = ["tmp\\main.exe"]

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  silent = false
  time = false

[misc]
  clean_on_exit = true

[proxy]
  enabled = false